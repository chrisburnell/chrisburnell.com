name: Setup
description: Setup for build

runs:
  using: composite
  steps:
    - name: Set the timezone
      uses: zcong1993/setup-timezone@040202c2ecba2d55edb016acf01bbeb42261dfc0 # 2.0.0
      with:
        timezone: America/Halifax

    - name: Install pnpm
      run: npm install -g pnpm@latest-11
      shell: bash

    - name: Set the Node version
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # 7.0.0
      with:
        cache: pnpm
        node-version-file: ".nvmrc"
