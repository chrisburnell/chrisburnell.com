name: Build
description: Build the site for development

runs:
  using: composite
  steps:
    - name: Build website
      run: |
        set -e
        pnpm run build:dev
      shell: bash
      env:
        NODE_OPTIONS: "--max-old-space-size=8192"

    - name: Build search index
      run: pnpm run create-search-index
      shell: bash
