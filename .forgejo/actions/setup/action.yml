name: Setup
description: Setup for build

runs:
  using: composite
  steps:
    - name: Set the timezone
      run: |
        echo "Before: $(date '+%Z %:z %H:%M')"
        echo "TZ=America/Halifax" >> $GITHUB_ENV
      shell: bash

    - name: Install the latest version of npm and pnpm
      run: npm install -g npm@latest pnpm@latest-11
      shell: bash

    - name: Set the Node version
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # 4.4.0
      with:
        cache: pnpm
        node-version-file: ".nvmrc"
