name: Development

on:
  push:
    branches:
      - development

concurrency:
  group: development
  cancel-in-progress: true

jobs:
  build:
    name: Development
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Setup
        uses: ./.forgejo/actions/setup

      - name: Install
        uses: ./.forgejo/actions/install

      - name: Test
        uses: ./.forgejo/actions/test

      - name: Restore 11ty cache
        id: restore-eleventy-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
        with:
          path: .cache
          key: eleventy-cache-dev-${{ env.FORGEJO_RUN_ID }}-${{ env.FORGEJO_RUN_ATTEMPT }}
          restore-keys: |
            eleventy-cache-dev-${{ env.FORGEJO_RUN_ID }}-
            eleventy-cache-dev-

      - name: Restore Site cache
        id: restore-site-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
        with:
          path: |
            _site
            !_site/og-images
            !_site/pagefind
          key: site-cache-dev-${{ env.FORGEJO_RUN_ID }}
          restore-keys: site-cache-dev-

      - name: Restore OG images cache
        id: restore-og-images-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
        with:
          path: _site/og-images
          key: og-images-cache-dev-${{ env.FORGEJO_RUN_ID }}
          restore-keys: og-images-cache-dev-

      - name: Build
        if: steps.restore-site-cache.outputs.cache-hit != 'true'
        uses: ./.forgejo/actions/build-development
        env:
          FATHOM_SUMMARY_KEY: ${{ secrets.FATHOM_SUMMARY_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          LASTFM_API_TOKEN: ${{ secrets.LASTFM_API_TOKEN }}
          MUSICTHREAD_API_KEY: ${{ secrets.MUSICTHREAD_API_KEY }}
          PERSONAL_API_KEY: ${{ secrets.PERSONAL_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          VIGENERE_SECRET: ${{ secrets.VIGENERE_SECRET }}
          WEBMENTION_IO_TOKEN: ${{ secrets.WEBMENTION_IO_TOKEN }}

      - name: Check Build
        id: check-build
        if: steps.restore-site-cache.outputs.cache-hit != 'true'
        uses: ./.forgejo/actions/check

      - name: Install SSH Key
        uses: https://github.com/shimataro/ssh-key-action@87a8f067114a8ce263df83e9ed5c849953548bc3 # 2.8.1
        with:
          key: ${{ secrets.DEPLOY_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Copy files to server
        run: |
          rsync -azh --delete --exclude="audio" --exclude="fonts" --exclude="static" --chown=${{ secrets.DEPLOY_CHOWN }} \
            -e "ssh -p ${{ secrets.DEPLOY_PORT }}" \
            ./_site/ ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_DEV_PATH }}html && break

      - name: Process on server
        uses: https://github.com/appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # 1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: "${{ secrets.DEPLOY_PATH }}${{ secrets.DEPLOY_FILE }}"

      - name: Save 11ty cache
        id: save-eleventy-cache
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
        with:
          path: .cache
          key: eleventy-cache-dev-${{ env.FORGEJO_RUN_ID }}-${{ env.FORGEJO_RUN_ATTEMPT }}

      - name: Save Site cache
        id: save-site-cache
        if: always() && steps.check-build.outcome == 'success'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
        with:
          path: |
            _site
            !_site/og-images
            !_site/pagefind
          key: site-cache-dev-${{ env.FORGEJO_RUN_ID }}

      - name: Save OG images cache
        id: save-og-images-cache
        if: always() && steps.restore-og-images-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
        with:
          path: _site/og-images
          key: og-images-cache-dev-${{ env.FORGEJO_RUN_ID }}
